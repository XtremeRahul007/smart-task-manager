<!DOCTYPE html>
<html lang="en" data-theme="">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="dist/main.css">
    <link rel="icon" href="dist/assets/xtreme.ico" type="image/xtreme-icon">
    <title>Smart Task Manager</title>
    <script>
        (function () {
            savedTheme = localStorage.getItem("theme");
            if (savedTheme) {
                document.documentElement.dataset.theme = savedTheme;
                return;
            }
            const systemTheme = window.matchMedia("(prefers-color-scheme: dark)").matches;
            document.documentElement.dataset.theme = systemTheme ? "dark" : "light";
        })();
    </script>
</head>

<body>
    <section class="app-task-manager">
        <header class="app-logo-text-header">
            <button class="app-logo-header" id="asideMenuBtn"></button>
            <h1 class="app-text-header">Smart Task Manager</h1>
        </header>
        <nav class="app-search-bar">
            <div class="search-container">
                <button class="search-btn">
                    <div class="search-icon icon icon-search icon-sm"></div>
                </button>
                <input class="search-bar" type="search" placeholder="Search">
            </div>
        </nav>
        <header class="app-user-profile">
            <button type="button" class="theme-toggle-btn" id="theme-toggle-btn">
                <span class="theme-toggle-icon icon icon-sm" id="theme-toggle-icon"></span>
            </button>
            <button class="app-profile-icon" id="profileMenuBtn">R</button>
            <div class="app-profile-menu" id="profileMenu">
                <div>temp_item1</div>
                <div>temp_item2</div>
                <div>temp_item3</div>
            </div>
        </header>
        <aside id="sideBar" class="app-sidebar">
            <header class="app-logo-text-aside">
                <div class="app-logo-aside"></div>
                <h1 class="app-text-aside">Smart Task Manager</h1>
            </header>
            <p>sideBar</p>
        </aside>
        <main class="app-task-container">task-container</main>
        <footer class="app-footer"></footer>
        <div class="overLay" id="overLay"></div>
        <script type="module" src="./src/js/main.js"></script>
    </section>
</body>

</html>
